<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Giỏ hàng - Tech.no</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        .cart-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
        }

        .cart-box {
            background: white;
            width: 700px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.1);
        }

        .cart-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #222;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #e5e5e5;
        }

        .item-info {
            display: flex;
            flex-direction: column;
        }

        .item-name {
            font-size: 17px;
            font-weight: 600;
            color: #222;
        }

        .item-price {
            color: #666;
            margin-top: 5px;
            font-size: 14px;
        }

        .item-quantity input {
            width: 60px;
            padding: 8px;
            border: 1px solid #dcdcdc;
            border-radius: 5px;
            outline: none;
            text-align: center;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            font-size: 20px;
            font-weight: bold;
            color: #222;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: none;
            background: black;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background: #444;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 18px;
            text-decoration: none;
            color: #555;
            font-size: 14px;
        }

        .back-home:hover {
            color: black;
        }

    </style>
</head>
<body>

    <div id="navbar-container"></div>

    <!-- CART -->
    <div class="cart-container">

        <div class="cart-box">

            <h2>Giỏ hàng của bạn</h2>

            <!-- ITEM 1 -->
            <div class="cart-item">

                <div class="item-info">
                    <span class="item-name">Laptop Gaming ASUS ROG</span>
                    <span class="item-price">25.000.000đ</span>
                </div>

                <div class="item-quantity">
                    <input type="number" value="1" min="1">
                </div>

            </div>

            <!-- ITEM 2 -->
            <div class="cart-item">

                <div class="item-info">
                    <span class="item-name">Chuột Logitech G Pro</span>
                    <span class="item-price">2.500.000đ</span>
                </div>

                <div class="item-quantity">
                    <input type="number" value="2" min="1">
                </div>

            </div>

            <!-- ITEM 3 -->
            <div class="cart-item">

                <div class="item-info">
                    <span class="item-name">Bàn phím Keychron K8</span>
                    <span class="item-price">1.900.000đ</span>
                </div>

                <div class="item-quantity">
                    <input type="number" value="1" min="1">
                </div>

            </div>

            <!-- TOTAL -->
            <div class="cart-total">
                <span>Tổng cộng:</span>
                <span>31.900.000đ</span>
            </div>

            <!-- CHECKOUT BUTTON -->
            <button class="checkout-btn">
                Thanh toán
            </button>

            <!-- BACK -->
            <a href="../index.html" class="back-home">
                ← Tiếp tục mua sắm
            </a>

        </div>

    </div>
    
    <div id="footer-container"></div>

    <script src="/assets/js/main.js"></script>
</body>
</html>
