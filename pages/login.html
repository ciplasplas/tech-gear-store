<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập - Tech.no</title>

    <!-- SAME CSS FILE -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.1);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #222;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .input-group input:focus {
            border-color: #000;
        }

        .login-submit {
            width: 100%;
            padding: 12px;
            border: none;
            background: black;
            color: white;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-submit:hover {
            background: #444;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #555;
            font-size: 14px;
        }

        .back-home:hover {
            color: black;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="../index.html" class="logo">
            <img src="../assets/images/logo-techno.png" alt="Tech.no Logo">
        </a>

        <ul class="nav-links">
            <li><a href="../index.html">Trang chủ</a></li>
            <li><a href="laptop.html">Laptop</a></li>
            <li><a href="pc-gaming.html">PC Gaming</a></li>
            <li><a href="phu-kien.html">Phụ kiện</a></li>
            <li><a href="gio-hang.html">Giỏ hàng</a></li>
            <li><a href="login.html" class="login-btn">Đăng nhập</a></li>
        </ul>
    </nav>

    <!-- LOGIN FORM -->
    <div class="login-container">
        <div class="login-box">
            <h2>Đăng nhập</h2>

            <form>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Nhập email">
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" placeholder="Nhập mật khẩu">
                </div>

                <button type="submit" class="login-submit">
                    Đăng nhập
                </button>
            </form>

            <a href="../index.html" class="back-home">
                ← Quay lại trang chủ
            </a>
        </div>
    </div>

</body>
</html>
